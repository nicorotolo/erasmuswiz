# Auto-merge dei lotti di mappatura (push su mappatura/**).
# Filosofia "bulletproof": questo workflow NON deve MAI finire in rosso.
#  - Fonde solo i file DATI (js/dati-mete*.js) e lo stato (mappatura-stato.json),
#    con un merge a 3 vie che COMBINA correttamente i lotti (non sovrascrive).
#  - I file umani/infra (STATO_DEL_SITO.md, .github/**, .gitignore) vengono
#    SEMPRE riallineati alla versione di main: non possono generare conflitti.
#  - Se resta un conflitto VERO sui dati, NON fallisce: apre una Issue e si ferma
#    in verde. Il branch resta su GitHub, nessun lavoro viene perso.
name: Auto-merge mappatura

on:
  push:
    branches:
      - 'mappatura/**'

permissions:
  contents: write
  issues: write

concurrency:
  group: auto-merge-mappatura
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Integra il lotto su main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHA="${GITHUB_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          # Helper: in caso di problema apre una Issue e termina in VERDE (mai rosso).
          apri_issue() {
            echo "::warning::$1"
            gh issue create \
              --title "Auto-merge: intervento manuale su $BRANCH" \
              --body "$1"$'\n\n'"Branch: \`$BRANCH\` ($SHA). Il merge automatico si e' fermato per sicurezza (nessun dato perso). Il branch e' ancora su GitHub: integralo o cancellalo a mano." \
              2>/dev/null || true
            exit 0
          }

          # 1) Gia' integrato? Niente da fare: cancella il branch.
          if git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::notice::$BRANCH gia' su main. Cancello il branch."
            git push origin --delete "$BRANCH" || true
            exit 0
          fi

          # 2) Merge a 3 vie sui contenuti (combina i lotti, non sovrascrive).
          git checkout -B main origin/main
          git merge --squash "$SHA" || true

          # 3) Riallinea SEMPRE i file umani/infra a main: qui niente conflitti.
          git checkout origin/main -- STATO_DEL_SITO.md .gitignore .github 2>/dev/null || true

          # 4) Conflitti VERI rimasti (solo dati/stato)? -> Issue, non fallire.
          if git ls-files -u | grep -q .; then
            git reset --hard origin/main
            apri_issue "Conflitto reale sui dati nel branch $BRANCH: serve merge manuale."
          fi

          # 5) Dopo il riallineamento non c'e' nulla di utile da fondere?
          if git diff --cached --quiet; then
            echo "::notice::Nessuna modifica dati utile in $BRANCH. Cancello il branch."
            git push origin --delete "$BRANCH" || true
            exit 0
          fi

          # 6) Valida il RISULTATO prima di pubblicare.
          for f in js/dati-mete*.js; do
            [ -e "$f" ] || continue
            node --check "$f" || apri_issue "node --check fallito su $f dopo il merge di $BRANCH."
          done
          node scripts/valida-stato.mjs || apri_issue "Validatore di coerenza fallito dopo il merge di $BRANCH."

          # 7) Pubblica e pulisci.
          git commit -m "mappatura: auto-merge $BRANCH"
          git push origin main || apri_issue "Push su main rifiutato per $BRANCH: riprovare."
          git push origin --delete "$BRANCH" || true
          echo "::notice::$BRANCH fuso su main e branch cancellato."
