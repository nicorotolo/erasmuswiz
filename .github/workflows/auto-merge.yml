# Auto-merge dei lotti di mappatura spinti da Codex.
# Codex non apre PR (non ha gh e il connettore non le crea da solo): spinge solo
# un branch "mappatura/...". Questa Action si attiva su QUEL push, ri-valida e
# fonde il branch su main. NON usa Claude né token a pagamento: solo i runner
# gratuiti di GitHub e il GITHUB_TOKEN integrato.
name: Auto-merge mappatura

on:
  push:
    branches:
      - 'mappatura/**'

permissions:
  contents: write

concurrency:
  group: auto-merge-mappatura
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --check sui file dati
        run: for f in js/dati-mete*.js; do [ -e "$f" ] || continue; node --check "$f"; done
      - name: Validatore di coerenza
        run: node scripts/valida-stato.mjs
      - name: Merge squash su main
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHA="${GITHUB_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git merge --squash "$SHA"
          if git diff --cached --quiet; then
            echo "::notice::Nessuna modifica rispetto a main, niente da mergere."
          else
            git commit -m "mappatura: auto-merge $BRANCH"
            git push origin main
            echo "::notice::Branch $BRANCH fuso su main."
          fi
          git push origin --delete "$BRANCH" || true
