# Auto-merge dei lotti di mappatura.
# Si attiva su ogni push a mappatura/**. Valida i file dati, poi fonde su main
# con squash. Se il branch è divergente (un altro run ha già avanzato main),
# lo elimina silenziosamente invece di fallire — il prossimo run raccoglierà
# il lavoro mancante.
name: Auto-merge mappatura

on:
  push:
    branches:
      - 'mappatura/**'

permissions:
  contents: write

concurrency:
  group: auto-merge-mappatura
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --check sui file dati
        run: for f in js/dati-mete*.js; do [ -e "$f" ] || continue; node --check "$f"; done
      - name: Validatore di coerenza
        run: node scripts/valida-stato.mjs
      - name: Merge squash su main
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHA="${GITHUB_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Aggiorna il ref di main prima di tutto
          git fetch origin main

          # Guardia divergenza: il branch deve essere basato sull'attuale tip di main.
          # Se un altro run ha già avanzato main, questo branch è orfano:
          # lo eliminiamo silenziosamente — il prossimo run raccoglierà il lavoro.
          MAIN_TIP=$(git rev-parse origin/main)
          BRANCH_BASE=$(git merge-base "$SHA" origin/main)
          if [ "$BRANCH_BASE" != "$MAIN_TIP" ]; then
            echo "::warning::Branch $BRANCH è divergente (base=$BRANCH_BASE, main=$MAIN_TIP). Batch già integrato da un altro run — branch eliminato."
            git push origin --delete "$BRANCH" || true
            exit 0
          fi

          git checkout -B main origin/main
          git merge --squash "$SHA"
          if git diff --cached --quiet; then
            echo "::notice::Nessuna modifica rispetto a main, niente da mergere."
          else
            git commit -m "mappatura: auto-merge $BRANCH"
            git push origin main
            echo "::notice::Branch $BRANCH fuso su main."
          fi
          git push origin --delete "$BRANCH" || true
