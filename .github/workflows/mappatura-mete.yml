# Mappatura notturna delle mete Erasmus.
# Gira sui server di GitHub (computer spento): due volte a notte Claude Code
# arricchisce UN batch di mete (determinato da mappatura-stato.json) e apre
# una pull request da revisionare. Il sito live cambia solo dopo il merge.
name: Mappatura mete Erasmus

on:
  schedule:
    # I limiti dell'abbonamento Claude sono a finestre mobili di 5 ore:
    # i due run distano >5h cosi' cadono in finestre separate.
    - cron: "0 23 * * *"  # ~01:00 ora italiana (estiva)
    - cron: "15 4 * * *"  # ~06:15 ora italiana (estiva)
  workflow_dispatch: {}

concurrency:
  group: mappatura-mete
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  mappatura:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lotto di mappatura con Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Edit,Write,Glob,Grep,WebFetch,WebSearch"
          prompt: |
            # MAPPATURA METE ERASMUS — ErasmusWiz

            Sei un ricercatore che lavora alla mappatura delle mete Erasmus per ErasmusWiz
            (sito statico di Ca' Foscari Venezia, GitHub Pages: https://nicorotolo.github.io/erasmuswiz/).
            Il tuo compito e' completare i dati mancanti per UN batch di mete, aggiornare
            i file JS e il file di stato, poi aprire una PR. NON fare push su main.

            ## PIPELINE A IMBUTO — leggi questo prima di tutto

            NON leggere mai i file `js/dati-mete*.js` per intero (sono enormi e
            sprecano token). Due script deterministici fanno l'estrazione e il
            merge; tu fai SOLO la ricerca web e produci un piccolo JSON.

            ## STEP 1 — Prepara il batch (estrazione minima)

            Esegui:
            ```bash
            node scripts/prepara-batch.mjs
            ```
            - Se esce con codice 2 ("Nessun batch pendente"): termina senza aprire
              PR e scrivi nel log "Mappatura completata — nessun batch pendente".
            - Altrimenti viene creato `batch/INPUT.json`: contiene il batch corrente
              con SOLO i campi-contesto (codiceErasmus, universita, citta, paese,
              linkPdf, linkSito) e, per ogni meta, `campiDaRiempire`.

            Leggi `batch/INPUT.json` (è piccolo, pochi KB). NON aprire il fileJs.

            ## STEP 2 — Ricerca dati mancanti

            Per ogni meta in `batch/INPUT.json`, cerca SOLO i campi elencati in
            `campiDaRiempire`, usando WebFetch e WebSearch.

            Fonti (in ordine di priorita'):
            1. Scheda Ca' Foscari: URL in `linkPdf`
               (https://apps.unive.it/dati/web/attach/destinazioni_erasmus/XXXXX)
            2. Sito incoming ufficiale dell'ateneo: `linkSito` se presente
            3. Cerca: "[nome universita] Erasmus incoming students deadlines 2025 2026"
            4. Cerca: "[nome universita] exchange students fact sheet 2026"

            ### Regole per requisitoLingua:
            - Trova livello CEFR (A1-C1) per la lingua di insegnamento
            - Se offre corsi in piu' lingue (es. inglese + locale), includi entrambi
            - Se il sito NON specifica livello CEFR: OMETTI il campo e metti in
              `notePraticheAppend`: "Lingua: nessun requisito CEFR formale indicato sul sito ufficiale"
            - NON inventare livelli — meglio ometterlo che un dato sbagliato

            ### Regole per scadenzeOspitante:
            - Cerca nomination E application deadlines, per sem. autunnale E primaverile
            - Se trovi solo 2024/25 e non ancora 2025/26: usali, con
              `notePraticheAppend`: "Scadenze: basate su 2024/25 — verificare aggiornamento"
            - Se davvero non trovabile: OMETTI il campo

            ### Regole generali:
            - `linkSito`: includilo solo se trovi l'URL diretto alla pagina incoming
            - Se una meta e' irraggiungibile: OMETTILA dall'OUTPUT, NON bloccare il batch
            - Le note iniziali ("Aperta a: ... [Dati ufficiali...]") le preserva lo
              script: tu fornisci solo il testo da aggiungere in `notePraticheAppend`.

            ### Se tipo == "nuovo_dipartimento":
            - In questo caso NON usare la pipeline a imbuto. Vai su
              https://www.unive.it/data/11679, filtra per il dipartimento indicato,
              crea il fileJs con TUTTE le mete (schema di js/dati-mete.js), e aggiungi
              i relativi batch in fondo a `prossimiBatch` in mappatura-stato.json.

            ## STEP 3 — Scrivi batch/OUTPUT.json

            Crea `batch/OUTPUT.json`: una chiave per ogni codiceErasmus con dati
            trovati (le mete senza dati si omettono). Per ogni meta, SOLO i campi
            trovati + opzionale `notePraticheAppend` + `fonti` (campo→URL). Esempio:
            ```json
            {
              "E GRANADA01": {
                "requisitoLingua": [
                  { "lingua": "Spagnolo", "livello": "B1", "condizione": "per corsi in spagnolo" }
                ],
                "scadenzeOspitante": [
                  { "cosa": "Nomination (sem. autunnale)", "periodo": "entro 15 maggio" }
                ],
                "linkSito": "https://...",
                "notePraticheAppend": "Scadenze: basate su 2024/25 — verificare",
                "fonti": { "scadenzeOspitante": "https://.../deadlines" }
              }
            }
            ```
            NON modificare i file JS a mano. NON includere campi immutabili.

            ## STEP 4 — Applica il merge (deterministico)

            Esegui:
            ```bash
            node scripts/applica-batch.mjs
            ```
            Lo script fonde l'OUTPUT nel fileJs (solo i campi trovati, campi
            immutabili intatti), esegue `node --check`, aggiorna
            `mappatura-stato.json` e salva le fonti in `batch/FONTI-<id>.json`.
            Se lo script esce con errore, NON committare: riporta l'errore e fermati.

            ## STEP 6 — NON toccare STATO_DEL_SITO.md

            ⚠️ NON modificare `STATO_DEL_SITO.md`. È un documento-bussola umano e
            viene aggiornato fuori dal flusso automatico. Modificarlo qui causa
            conflitti di merge tra lotti paralleli. Lascialo invariato.

            ## STEP 7 — Crea branch, commit, apri PR

            ⚠️ REGOLA ASSOLUTA: questo step si esegue UNA SOLA VOLTA, per UN SOLO batch.
            Dopo `gh pr create` il tuo lavoro è FINITO. Non tornare allo STEP 1.
            Non leggere di nuovo mappatura-stato.json. Non cercare altri batch.
            Una sessione = un batch = una PR. Stop.

            ```bash
            BRANCH="mappatura/lotto-$(date +%Y%m%d-%H%M)"
            git checkout -b "$BRANCH"
            git add js/dati-mete.js js/dati-mete-*.js mappatura-stato.json batch/FONTI-*.json 2>/dev/null || true
            git diff --cached --stat
            BATCH_DESC="[descrizione breve delle mete lavorate]"
            git commit -m "mete: $BATCH_DESC — $(date +%Y-%m-%d)"
            git push origin "$BRANCH"
            gh pr create \
              --title "Mappatura mete: $BATCH_DESC — $(date +%Y-%m-%d)" \
              --body "## Batch completato

            **Tipo:** [tipo]
            **Mete lavorate:** [lista codici Erasmus separati da virgola]

            ### Dati aggiunti
            - [meta 1]: [requisitoLingua / scadenze aggiunte]
            - [meta 2]: [requisitoLingua / scadenze aggiunte]

            ### Mete saltate o dati non trovati
            [se presenti, elenca meta + motivo]

            ### Stato aggiornato
            - Batch rimanenti in coda: [N]
            - Prossimo batch: [descrizione prossimiBatch[0]]" \
              --base main
            ```

            ## RIFERIMENTO: struttura corretta per requisitoLingua e scadenzeOspitante

            Esempio da Aix-Marseille (la meta di riferimento completa):
            ```js
            requisitoLingua: [
              { lingua: "Francese", livello: "B1", condizione: "per i corsi in francese" },
              { lingua: "Inglese", livello: "B2", condizione: "per i corsi in inglese" }
            ],
            scadenzeOspitante: [
              { cosa: "Nomination (autunno/anno intero)", periodo: "1 marzo - 1 aprile" },
              { cosa: "Application (autunno/anno intero)", periodo: "entro 15 aprile" },
              { cosa: "Nomination (primavera)", periodo: "1 settembre - 1 ottobre" },
              { cosa: "Application (primavera)", periodo: "entro 15 ottobre" }
            ],
            ```

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
