document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6b35e9b1-f64e-4591-aa58-d3ff5ca67ea4\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9a8a0ea1-a036-4bed-b614-5d275bc8b6cc\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5eaed24f-52b6-434d-bc87-4a7665dce644\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   ErasmusWiz — COLORI\n   \"Blu chiarino\" amichevole + accento oro (la magia: stelle e\n   scintille). Neutri leggermente freddi. Semantici onesti per\n   le fasce di compatibilità (ok / con riserve / bloccata).\n   ============================================================ */\n\n:root {\n  /* ---- BLU PRIMARIO (azzurro, non istituzionale) ---- */\n  --blue-50:  #eef4ff;\n  --blue-100: #dce8ff;\n  --blue-200: #bcd2ff;\n  --blue-300: #92b4ff;\n  --blue-400: #5e8eff;\n  --blue-500: #3d7dff; /* brand primario */\n  --blue-600: #2a63ec;\n  --blue-700: #214ec4;\n  --blue-800: #1d409c;\n  --blue-900: #1b377b;\n\n  /* ---- ORO / AMBRA (la \"magia\": stelle, scintille, evidenze) ---- */\n  --gold-50:  #fff8e8;\n  --gold-100: #ffeec2;\n  --gold-200: #ffdd87;\n  --gold-300: #ffcb4d;\n  --gold-400: #ffb627; /* accento magico */\n  --gold-500: #f59e0b;\n  --gold-600: #d97f06;\n\n  /* ---- NEUTRI (slate con un soffio di blu) ---- */\n  --ink-900: #121829; /* testo forte, quasi nero */\n  --ink-800: #1f2840;\n  --ink-700: #36415c;\n  --ink-600: #4a566f;\n  --ink-500: #65718c; /* testo tenue */\n  --ink-400: #8b95ac;\n  --ink-300: #aeb6c8;\n  --ink-200: #d6dceb;\n  --ink-100: #e7ecf6;\n  --ink-50:  #f3f6fc;\n  --white:   #ffffff;\n\n  /* ---- SFONDI ---- */\n  --paper:        #ffffff;          /* card */\n  --bg-page:      #f3f6fc;          /* pagina, tinta blu chiara */\n  --bg-sunken:    #eaf1fe;          /* pannello incassato / barra */\n  --bg-night:     #1b377b;          /* superfici \"magiche\" scure (hero) */\n  --bg-night-2:   #16306f;\n\n  /* ---- SEMANTICI: COMPATIBILITÀ (onestà) ---- */\n  /* ✅ Compatibile (>=80) */\n  --ok-600:  #15924a;\n  --ok-500:  #1aa657;\n  --ok-bg:   #e6f6ec;\n  --ok-text: #0f7a3a;\n  --ok-line: #bce6cb;\n\n  /* ⚠️ Possibile con riserve (40-79) */\n  --warn-600: #c2700a;\n  --warn-500: #e08808;\n  --warn-bg:  #fff3df;\n  --warn-text:#9a5b08;\n  --warn-line:#ffe0a6;\n\n  /* 🔒 Non accessibile ora (<40) / bloccato */\n  --lock-600: #d23f48;\n  --lock-500: #e0545c;\n  --lock-bg:  #fdecec;\n  --lock-text:#b42318;\n  --lock-line:#f6cdcd;\n\n  /* ---- ALIAS SEMANTICI (usa questi nei componenti) ---- */\n  --color-primary:        var(--blue-500);\n  --color-primary-hover:  var(--blue-600);\n  --color-primary-active: var(--blue-700);\n  --color-primary-soft:   var(--blue-50);\n  --color-accent:         var(--gold-400);\n  --color-accent-strong:  var(--gold-500);\n\n  --text-strong:   var(--ink-900);\n  --text-body:     var(--ink-700);\n  --text-muted:    var(--ink-500);\n  --text-faint:    var(--ink-400);\n  --text-on-primary: #ffffff;\n  --text-link:     var(--blue-600);\n\n  --surface-page:   var(--bg-page);\n  --surface-card:   var(--paper);\n  --surface-sunken: var(--bg-sunken);\n  --surface-soft:   var(--blue-50);\n\n  --border-subtle: var(--ink-100);\n  --border-strong: var(--ink-200);\n  --border-focus:  var(--blue-400);\n\n  --ring: color-mix(in srgb, var(--blue-500) 35%, transparent);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   ErasmusWiz — TIPOGRAFIA\n   Famiglie, scala (mobile-first, generosa), pesi, interlinea.\n   ============================================================ */\n\n:root {\n  /* ---- FAMIGLIE ---- */\n  --font-display: 'Bricolage Grotesque', 'Plus Jakarta Sans', system-ui, sans-serif;\n  --font-sans:    'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;\n  --font-mono:    'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;\n\n  /* ---- PESI ---- */\n  --w-regular:  400; /* @kind font */\n  --w-medium:   500; /* @kind font */\n  --w-semibold: 600; /* @kind font */\n  --w-bold:     700; /* @kind font */\n  --w-extra:    800; /* @kind font */\n\n  /* ---- SCALA TIPOGRAFICA (rem, base 16px) ---- */\n  --fs-xs:   0.75rem;   /* 12 — micro etichette */\n  --fs-sm:   0.875rem;  /* 14 — note, didascalie */\n  --fs-base: 1rem;      /* 16 — testo */\n  --fs-md:   1.125rem;  /* 18 — testo enfatico / intro */\n  --fs-lg:   1.375rem;  /* 22 — titolo card */\n  --fs-xl:   1.75rem;   /* 28 — titolo sezione */\n  --fs-2xl:  2.25rem;   /* 36 — display piccolo */\n  --fs-3xl:  3rem;      /* 48 — display */\n  --fs-4xl:  3.75rem;   /* 60 — hero */\n\n  /* ---- INTERLINEA ---- */\n  --lh-tight:   1.1;  /* @kind font */\n  --lh-snug:    1.25; /* @kind font */\n  --lh-normal:  1.5;  /* @kind font */\n  --lh-relaxed: 1.65; /* @kind font */\n\n  /* ---- SPAZIATURA LETTERE ---- */\n  --ls-tight:  -0.02em; /* @kind font */\n  --ls-snug:   -0.01em;  /* @kind font */\n  --ls-normal: 0;        /* @kind font */\n  --ls-wide:   0.04em;   /* @kind font */\n\n  /* ---- ALIAS SEMANTICI ---- */\n  --text-hero:    var(--w-extra) var(--fs-4xl)/var(--lh-tight) var(--font-display); /* @kind font */\n  --text-display: var(--w-bold)  var(--fs-3xl)/var(--lh-tight) var(--font-display); /* @kind font */\n  --text-h1:      var(--w-bold)  var(--fs-2xl)/var(--lh-snug)  var(--font-display); /* @kind font */\n  --text-h2:      var(--w-bold)  var(--fs-xl)/var(--lh-snug)   var(--font-display); /* @kind font */\n  --text-h3:      var(--w-semibold) var(--fs-lg)/var(--lh-snug) var(--font-display); /* @kind font */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   ErasmusWiz — SPAZIATURA, RAGGI, OMBRE, MOVIMENTO\n   Scala 4px. Raggi generosi e amichevoli. Ombre morbide a tinta\n   blu (mai nero puro): aria, leggerezza.\n   ============================================================ */\n\n:root {\n  /* ---- SPAZIATURA (scala 4px) ---- */\n  --space-0:  0;\n  --space-1:  0.25rem; /* 4  */\n  --space-2:  0.5rem;  /* 8  */\n  --space-3:  0.75rem; /* 12 */\n  --space-4:  1rem;    /* 16 */\n  --space-5:  1.25rem; /* 20 */\n  --space-6:  1.5rem;  /* 24 */\n  --space-8:  2rem;    /* 32 */\n  --space-10: 2.5rem;  /* 40 */\n  --space-12: 3rem;    /* 48 */\n  --space-16: 4rem;    /* 64 */\n  --space-20: 5rem;    /* 80 */\n\n  /* ---- RAGGI (morbidi, giovanili) ---- */\n  --radius-xs:   6px;\n  --radius-sm:   10px;\n  --radius-md:   14px;  /* bottoni, campi */\n  --radius-lg:   20px;  /* card */\n  --radius-xl:   28px;  /* superfici grandi / hero */\n  --radius-pill: 999px; /* chip, countdown, badge */\n\n  /* ---- OMBRE (tinta blu, morbide) ---- */\n  --shadow-xs: 0 1px 2px rgba(27, 55, 123, 0.06);\n  --shadow-sm: 0 2px 6px rgba(27, 55, 123, 0.07);\n  --shadow-md: 0 6px 18px rgba(27, 55, 123, 0.10);\n  --shadow-lg: 0 14px 34px rgba(27, 55, 123, 0.14);\n  --shadow-xl: 0 24px 60px rgba(27, 55, 123, 0.18);\n  /* evidenza dorata per elementi \"magici\" / in primo piano */\n  --shadow-gold: 0 8px 24px rgba(245, 158, 11, 0.28);\n  --shadow-focus: 0 0 0 4px var(--ring);\n\n  /* ---- LARGHEZZE CONTENITORE ---- */\n  --container-sm: 640px;  /* @kind spacing */\n  --container-md: 820px;  /* @kind spacing */\n  --container-lg: 1120px; /* @kind spacing */\n\n  /* ---- MOVIMENTO (gentile, mai brusco) ---- */\n  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);    /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);    /* @kind other */\n  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --dur-fast:   120ms; /* @kind other */\n  --dur-base:   200ms; /* @kind other */\n  --dur-slow:   360ms; /* @kind other */\n\n  /* ---- LIVELLI Z ---- */\n  --z-base: 1;      /* @kind other */\n  --z-sticky: 100;  /* @kind other */\n  --z-overlay: 500; /* @kind other */\n  --z-toast: 800;   /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   ErasmusWiz — BASE / RESET\n   Reset leggero + stili di base degli elementi, basati sui token.\n   ============================================================ */\n\n*,\n*::before,\n*::after {\n  box-sizing: border-box;\n}\n\n* {\n  margin: 0;\n}\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  text-rendering: optimizeLegibility;\n  -webkit-font-smoothing: antialiased;\n}\n\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--fs-base);\n  font-weight: var(--w-regular);\n  line-height: var(--lh-normal);\n  color: var(--text-body);\n  background: var(--surface-page);\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--ls-snug);\n  font-weight: var(--w-bold);\n}\n\na {\n  color: var(--text-link);\n  text-decoration: none;\n}\na:hover { text-decoration: underline; }\n\nbutton, input, select, textarea {\n  font: inherit;\n  color: inherit;\n}\n\n::selection {\n  background: var(--blue-200);\n  color: var(--ink-900);\n}\n\n:focus-visible {\n  outline: none;\n  box-shadow: var(--shadow-focus);\n  border-radius: var(--radius-sm);\n}\n\n/* Utility contenitore */\n.ew-container {\n  width: 100%;\n  max-width: var(--container-lg);\n  margin-inline: auto;\n  padding-inline: var(--space-4);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   ErasmusWiz — Design System\n   Punto d'ingresso unico dei CSS. Solo @import: i consumatori\n   linkano questo file e ottengono token, font e base.\n   ============================================================ */\n\n/* ============================================================\n   ErasmusWiz — FONT (Google Fonts)\n   - Bricolage Grotesque : display / titoli (carattere, non infantile)\n   - Plus Jakarta Sans   : UI e testo (giovanile, leggibilissimo)\n   - Space Mono          : numeri, countdown, codici Erasmus (vibe \"dati\")\n\n   NOTA: i font sono caricati dalla CDN di Google Fonts. Per la\n   produzione conviene self-hostare i .woff2 e sostituire questo\n   @import con regole @font-face locali.\n   ============================================================ */\n\n/* vietnamese */\n@font-face {\n  font-family: 'Bricolage Grotesque';\n  font-style: normal;\n  font-weight: 500;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"f0b47fa2-45dc-4318-8e0e-c181e95905d6\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Bricolage Grotesque';\n  font-style: normal;\n  font-weight: 500;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"8eea1384-ca67-4333-bcf0-010ef7dc3afb\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font 2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"55371b38-404c-44ac-b9c1-9f6a52c45cef\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6b35e9b1-f64e-4591-aa58-d3ff5ca67ea4\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9a8a0ea1-a036-4bed-b614-5d275bc8b6cc\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5eaed24f-52b6-434d-bc87-4a7665dce644\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   ErasmusWiz — COLORI\n   \"Blu chiarino\" amichevole + accento oro (la magia: stelle e\n   scintille). Neutri leggermente freddi. Semantici onesti per\n   le fasce di compatibilità (ok / con riserve / bloccata).\n   ============================================================ */\n\n:root {\n  /* ---- BLU PRIMARIO (azzurro, non istituzionale) ---- */\n  --blue-50:  #eef4ff;\n  --blue-100: #dce8ff;\n  --blue-200: #bcd2ff;\n  --blue-300: #92b4ff;\n  --blue-400: #5e8eff;\n  --blue-500: #3d7dff; /* brand primario */\n  --blue-600: #2a63ec;\n  --blue-700: #214ec4;\n  --blue-800: #1d409c;\n  --blue-900: #1b377b;\n\n  /* ---- ORO / AMBRA (la \"magia\": stelle, scintille, evidenze) ---- */\n  --gold-50:  #fff8e8;\n  --gold-100: #ffeec2;\n  --gold-200: #ffdd87;\n  --gold-300: #ffcb4d;\n  --gold-400: #ffb627; /* accento magico */\n  --gold-500: #f59e0b;\n  --gold-600: #d97f06;\n\n  /* ---- NEUTRI (slate con un soffio di blu) ---- */\n  --ink-900: #121829; /* testo forte, quasi nero */\n  --ink-800: #1f2840;\n  --ink-700: #36415c;\n  --ink-600: #4a566f;\n  --ink-500: #65718c; /* testo tenue */\n  --ink-400: #8b95ac;\n  --ink-300: #aeb6c8;\n  --ink-200: #d6dceb;\n  --ink-100: #e7ecf6;\n  --ink-50:  #f3f6fc;\n  --white:   #ffffff;\n\n  /* ---- SFONDI ---- */\n  --paper:        #ffffff;          /* card */\n  --bg-page:      #f3f6fc;          /* pagina, tinta blu chiara */\n  --bg-sunken:    #eaf1fe;          /* pannello incassato / barra */\n  --bg-night:     #1b377b;          /* superfici \"magiche\" scure (hero) */\n  --bg-night-2:   #16306f;\n\n  /* ---- SEMANTICI: COMPATIBILITÀ (onestà) ---- */\n  /* ✅ Compatibile (>=80) */\n  --ok-600:  #15924a;\n  --ok-500:  #1aa657;\n  --ok-bg:   #e6f6ec;\n  --ok-text: #0f7a3a;\n  --ok-line: #bce6cb;\n\n  /* ⚠️ Possibile con riserve (40-79) */\n  --warn-600: #c2700a;\n  --warn-500: #e08808;\n  --warn-bg:  #fff3df;\n  --warn-text:#9a5b08;\n  --warn-line:#ffe0a6;\n\n  /* 🔒 Non accessibile ora (<40) / bloccato */\n  --lock-600: #d23f48;\n  --lock-500: #e0545c;\n  --lock-bg:  #fdecec;\n  --lock-text:#b42318;\n  --lock-line:#f6cdcd;\n\n  /* ---- ALIAS SEMANTICI (usa questi nei componenti) ---- */\n  --color-primary:        var(--blue-500);\n  --color-primary-hover:  var(--blue-600);\n  --color-primary-active: var(--blue-700);\n  --color-primary-soft:   var(--blue-50);\n  --color-accent:         var(--gold-400);\n  --color-accent-strong:  var(--gold-500);\n\n  --text-strong:   var(--ink-900);\n  --text-body:     var(--ink-700);\n  --text-muted:    var(--ink-500);\n  --text-faint:    var(--ink-400);\n  --text-on-primary: #ffffff;\n  --text-link:     var(--blue-600);\n\n  --surface-page:   var(--bg-page);\n  --surface-card:   var(--paper);\n  --surface-sunken: var(--bg-sunken);\n  --surface-soft:   var(--blue-50);\n\n  --border-subtle: var(--ink-100);\n  --border-strong: var(--ink-200);\n  --border-focus:  var(--blue-400);\n\n  --ring: color-mix(in srgb, var(--blue-500) 35%, transparent);\n}\n\n/* ============================================================\n   ErasmusWiz — TIPOGRAFIA\n   Famiglie, scala (mobile-first, generosa), pesi, interlinea.\n   ============================================================ */\n\n:root {\n  /* ---- FAMIGLIE ---- */\n  --font-display: 'Bricolage Grotesque', 'Plus Jakarta Sans', system-ui, sans-serif;\n  --font-sans:    'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;\n  --font-mono:    'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;\n\n  /* ---- PESI ---- */\n  --w-regular:  400; /* @kind font */\n  --w-medium:   500; /* @kind font */\n  --w-semibold: 600; /* @kind font */\n  --w-bold:     700; /* @kind font */\n  --w-extra:    800; /* @kind font */\n\n  /* ---- SCALA TIPOGRAFICA (rem, base 16px) ---- */\n  --fs-xs:   0.75rem;   /* 12 — micro etichette */\n  --fs-sm:   0.875rem;  /* 14 — note, didascalie */\n  --fs-base: 1rem;      /* 16 — testo */\n  --fs-md:   1.125rem;  /* 18 — testo enfatico / intro */\n  --fs-lg:   1.375rem;  /* 22 — titolo card */\n  --fs-xl:   1.75rem;   /* 28 — titolo sezione */\n  --fs-2xl:  2.25rem;   /* 36 — display piccolo */\n  --fs-3xl:  3rem;      /* 48 — display */\n  --fs-4xl:  3.75rem;   /* 60 — hero */\n\n  /* ---- INTERLINEA ---- */\n  --lh-tight:   1.1;  /* @kind font */\n  --lh-snug:    1.25; /* @kind font */\n  --lh-normal:  1.5;  /* @kind font */\n  --lh-relaxed: 1.65; /* @kind font */\n\n  /* ---- SPAZIATURA LETTERE ---- */\n  --ls-tight:  -0.02em; /* @kind font */\n  --ls-snug:   -0.01em;  /* @kind font */\n  --ls-normal: 0;        /* @kind font */\n  --ls-wide:   0.04em;   /* @kind font */\n\n  /* ---- ALIAS SEMANTICI ---- */\n  --text-hero:    var(--w-extra) var(--fs-4xl)/var(--lh-tight) var(--font-display); /* @kind font */\n  --text-display: var(--w-bold)  var(--fs-3xl)/var(--lh-tight) var(--font-display); /* @kind font */\n  --text-h1:      var(--w-bold)  var(--fs-2xl)/var(--lh-snug)  var(--font-display); /* @kind font */\n  --text-h2:      var(--w-bold)  var(--fs-xl)/var(--lh-snug)   var(--font-display); /* @kind font */\n  --text-h3:      var(--w-semibold) var(--fs-lg)/var(--lh-snug) var(--font-display); /* @kind font */\n}\n\n/* ============================================================\n   ErasmusWiz — SPAZIATURA, RAGGI, OMBRE, MOVIMENTO\n   Scala 4px. Raggi generosi e amichevoli. Ombre morbide a tinta\n   blu (mai nero puro): aria, leggerezza.\n   ============================================================ */\n\n:root {\n  /* ---- SPAZIATURA (scala 4px) ---- */\n  --space-0:  0;\n  --space-1:  0.25rem; /* 4  */\n  --space-2:  0.5rem;  /* 8  */\n  --space-3:  0.75rem; /* 12 */\n  --space-4:  1rem;    /* 16 */\n  --space-5:  1.25rem; /* 20 */\n  --space-6:  1.5rem;  /* 24 */\n  --space-8:  2rem;    /* 32 */\n  --space-10: 2.5rem;  /* 40 */\n  --space-12: 3rem;    /* 48 */\n  --space-16: 4rem;    /* 64 */\n  --space-20: 5rem;    /* 80 */\n\n  /* ---- RAGGI (morbidi, giovanili) ---- */\n  --radius-xs:   6px;\n  --radius-sm:   10px;\n  --radius-md:   14px;  /* bottoni, campi */\n  --radius-lg:   20px;  /* card */\n  --radius-xl:   28px;  /* superfici grandi / hero */\n  --radius-pill: 999px; /* chip, countdown, badge */\n\n  /* ---- OMBRE (tinta blu, morbide) ---- */\n  --shadow-xs: 0 1px 2px rgba(27, 55, 123, 0.06);\n  --shadow-sm: 0 2px 6px rgba(27, 55, 123, 0.07);\n  --shadow-md: 0 6px 18px rgba(27, 55, 123, 0.10);\n  --shadow-lg: 0 14px 34px rgba(27, 55, 123, 0.14);\n  --shadow-xl: 0 24px 60px rgba(27, 55, 123, 0.18);\n  /* evidenza dorata per elementi \"magici\" / in primo piano */\n  --shadow-gold: 0 8px 24px rgba(245, 158, 11, 0.28);\n  --shadow-focus: 0 0 0 4px var(--ring);\n\n  /* ---- LARGHEZZE CONTENITORE ---- */\n  --container-sm: 640px;  /* @kind spacing */\n  --container-md: 820px;  /* @kind spacing */\n  --container-lg: 1120px; /* @kind spacing */\n\n  /* ---- MOVIMENTO (gentile, mai brusco) ---- */\n  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);    /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);    /* @kind other */\n  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --dur-fast:   120ms; /* @kind other */\n  --dur-base:   200ms; /* @kind other */\n  --dur-slow:   360ms; /* @kind other */\n\n  /* ---- LIVELLI Z ---- */\n  --z-base: 1;      /* @kind other */\n  --z-sticky: 100;  /* @kind other */\n  --z-overlay: 500; /* @kind other */\n  --z-toast: 800;   /* @kind other */\n}\n\n/* ============================================================\n   ErasmusWiz — BASE / RESET\n   Reset leggero + stili di base degli elementi, basati sui token.\n   ============================================================ */\n\n*,\n*::before,\n*::after {\n  box-sizing: border-box;\n}\n\n* {\n  margin: 0;\n}\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  text-rendering: optimizeLegibility;\n  -webkit-font-smoothing: antialiased;\n}\n\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--fs-base);\n  font-weight: var(--w-regular);\n  line-height: var(--lh-normal);\n  color: var(--text-body);\n  background: var(--surface-page);\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--ls-snug);\n  font-weight: var(--w-bold);\n}\n\na {\n  color: var(--text-link);\n  text-decoration: none;\n}\na:hover { text-decoration: underline; }\n\nbutton, input, select, textarea {\n  font: inherit;\n  color: inherit;\n}\n\n::selection {\n  background: var(--blue-200);\n  color: var(--ink-900);\n}\n\n:focus-visible {\n  outline: none;\n  box-shadow: var(--shadow-focus);\n  border-radius: var(--radius-sm);\n}\n\n/* Utility contenitore */\n.ew-container {\n  width: 100%;\n  max-width: var(--container-lg);\n  margin-inline: auto;\n  padding-inline: var(--space-4);\n}\n\n<\u002Fstyle>\n  <script src=\"1b9be2b0-f0d6-49de-9743-f6c0cb855fa9\"><\u002Fscript>\n  <script src=\"27a1f1fd-170f-436f-b0d9-00ed2a54cd97\"><\u002Fscript>\n  <script src=\"62f8fad3-08f4-4cb8-ba23-8b238695be5e\"><\u002Fscript>\n  <script src=\"68fbbe97-51ab-4a1f-aba8-f3d4de7d5e24\"><\u002Fscript>\n  <script src=\"faeb1a7b-4967-4216-8abc-197d946f6ca0\"><\u002Fscript>\n  <script src=\"00552303-f6b6-413d-9cae-8dc0c77c5b41\"><\u002Fscript>\n  <style>\n    body { background: var(--bg-page); }\n    @keyframes ew-pop { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }\n    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; font-family: var(--font-sans); color: var(--text-body); display: flex; flex-direction: column;\">\n\n  <!-- ======= TOP BAR (desktop) ======= -->\n  <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ false }}\">\n    <header style=\"background: var(--paper); border-bottom: 1px solid var(--border-subtle); padding: 12px 32px; display: flex; align-items: center; gap: 28px; position: sticky; top: 0; z-index: 20;\">\n      <x-import component-from-global-scope=\"ErasmusWizDesignSystem_eba6b2.Logo\" size=\"26\" hint-size=\"150px,30px\"><\u002Fx-import>\n      <nav style=\"display: flex; gap: 6px;\">\n        <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <button type=\"button\" onclick=\"{{ item.onClick }}\" style=\" on\" onclick=\"{{ opz.onClick }}\" style=\"{{ opz.style }}\">{{ opz.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ obLanding }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; flex-direction: column; gap: 14px; align-items: center; animation: ew-pop 0.3s ease;\">\n            <div style=\"background: var(--gold-50); border: 1px solid var(--gold-200); border-radius: var(--radius-lg); padding: 18px 20px; text-align: center;\">\n              <div style=\"font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--text-strong); line-height: 1.3;\">{{ obLandingTitolo }}<\u002Fdiv>\n              <p style=\"font-size: 13.5px; color: var(--text-muted); margin: 8px 0 0; line-height: 1.55;\">{{ obLandingDett }}<\u002Fp>\n            <\u002Fdiv>\n            <x-import component-from-global-scope=\"ErasmusWizDesignSystem_eba6b2.Button\" size=\"lg\" onclick=\"{{ obInizia }}\" hint-size=\"220px,52px\">Inizia il percorso →<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;dataSimulata&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Prototipo&quot;, &quot;description&quot;: &quot;Vista simulata al 9 feb 2026 (candidature aperte). Spegni per usare la data reale.&quot; },\n  &quot;mascotte&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Prototipo&quot;, &quot;description&quot;: &quot;Mostra Wiz (onboarding, consigli, celebrazioni).&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    pronto: false,\n    largo: typeof window !== \"undefined\" ? window.innerWidth : 1200,\n    tab: \"percorso\",\n    cerca: \"\",\n    filtro: \"tutte\",\n    metaAperta: null,\n    visibili: 12,\n    festa: false,\n    comeAperto: null,\n    zaino: null\n  };\n\n  // ---------- tempo (simulazione) ----------\n  ora() {\n    const sim = this.props.dataSimulata ?? true;\n    return sim ? new Date(\"2026-02-09T10:00:00\") : new Date();\n  }\n  giorniA(d) { return Math.ceil((new Date(d) - this.ora()) / 86400000); }\n  contoParole(d) {\n    const g = this.giorniA(d);\n    if (g < 0) return \"Scaduta\";\n    if (g === 0) return \"Oggi\";\n    if (g === 1) return \"1 giorno\";\n    return g + \" giorni\";\n  }\n  dataBreve(d) { return new Date(d).toLocaleDateString(\"it-IT\", { day: \"numeric\", month: \"short\" }); }\n\n  // ---------- zaino ----------\n  caricaZaino() {\n    try {\n      const g = localStorage.getItem(\"ew-proto-zaino\");\n      const z = g ? JSON.parse(g) : {};\n      return {\n        profilo: z.profilo || null,\n        obStep: z.profilo ? -1 : 0,\n        schedina: Array.isArray(z.schedina) ? z.schedina : [],\n        checklist: z.checklist && typeof z.checklist === \"object\" ? z.checklist : {},\n        checklistPost: z.checklistPost && typeof z.checklistPost === \"object\" ? z.checklistPost : {},\n        autoverifica: z.autoverifica && typeof z.autoverifica === \"object\" ? z.autoverifica : {},\n        selezionato: !!z.selezionato\n      };\n    } catch (e) {\n      return { profilo: null, obStep: 0, schedina: [], checklist: {}, checklistPost: {}, autoverifica: {}, selezionato: false };\n    }\n  }\n  salva() {\n    const z = this.state.zaino;\n    try { localStorage.setItem(\"ew-proto-zaino\", JSON.stringify({ profilo: z.profilo, schedina: z.schedina, checklist: z.checklist, checklistPost: z.checklistPost, autoverifica: z.autoverifica, selezionato: z.selezionato })); } catch (e) {}\n  }\n  muta(fn) {\n    const z = JSON.parse(JSON.stringify(this.state.zaino));\n    fn(z);\n    this.setState({ zaino: z }, () => this.salva());\n  }\n\n  dati() {\n    return {\n      METE: window.METE_ALL || [],\n      SCADENZE: window.SCADENZE_CAFOSCARI || [],\n      CHECKLIST: window.CHECKLIST || [],\n      CHECKLIST_POST: window.CHECKLIST_POST || [],\n      REQUISITI: window.REQUISITI_BANDO || []\n    };\n  }\n\n  componentDidMount() {\n    this._resize = () => this.setState({ largo: window.innerWidth });\n    window.addEventListener(\"resize\", this._resize);\n    const attendi = () => {\n      if (window.METE_ALL && window.SCADENZE_CAFOSCARI && window.CHECKLIST && window.REQUISITI_BANDO) {\n        this.setState({ pronto: true, zaino: this.caricaZaino() });\n      } else setTimeout(attendi, 100);\n    };\n    attendi();\n  }\n  componentWillUnmount() {\n    window.removeEventListener(\"resize\", this._resize);\n    clearTimeout(this._festaT);\n  }\n\n  // ---------- compatibilità ----------\n  livelloInParole(c) { return c === \"L\" ? \"triennale\" : c === \"LM\" ? \"magistrale\" : c; }\n  compat(meta, profilo) {\n    const SCALA = [\"A1\", \"A2\", \"B1\", \"B2\", \"C1\", \"C2\"];\n    const pLiv = meta.posti.some(p => p.livello === profilo.livello) ? 30 : 0;\n    const n = meta.posti.filter(p => p.livello === profilo.livello).reduce((s, p) => s + p.numero, 0);\n    const pPos = n <= 0 ? 0 : Math.min(20, 5 + (n - 1) * 3);\n    const linguaNota = !!(meta.requisitoLingua && meta.requisitoLingua.length);\n    if (!linguaNota) {\n      if (pLiv === 0) return { level: \"lock\", pct: null, ordine: 10, detail: \"Nessun posto per il tuo livello (\" + this.livelloInParole(profilo.livello) + \").\" };\n      return { level: \"verify\", pct: null, ordine: 60, detail: \"Livello e posti ok. Requisito lingua non dichiarato: verifica sulla scheda PDF.\" };\n    }\n    const pLing = Math.max(...meta.requisitoLingua.map(r => {\n      const l = (profilo.lingue || []).find(x => x.lingua === r.lingua);\n      if (!l) return 0;\n      const diff = SCALA.indexOf(l.livello) - SCALA.indexOf(r.livello);\n      if (diff >= 0) return l.certificata ? 50 : 25;\n      if (diff === -1) return 12;\n      return 0;\n    }));\n    const tot = Math.round(pLing + pLiv + pPos);\n    const motivi = [];\n    if (pLiv === 0) motivi.push(\"nessun posto per \" + this.livelloInParole(profilo.livello));\n    if (pLing === 25) motivi.push(\"lingua non certificata\");\n    else if (pLing === 12) motivi.push(\"un livello sotto il richiesto\");\n    else if (pLing === 0) motivi.push(\"requisito lingua non soddisfatto\");\n    const detail = motivi.length ? \"Attenzione: \" + motivi.join(\"; \") + \".\" : \"Hai i requisiti principali.\";\n    if (tot >= 80) return { level: \"ok\", pct: tot, ordine: tot, detail };\n    if (tot >= 40) return { level: \"warn\", pct: tot, ordine: tot, detail };\n    return { level: \"lock\", pct: tot, ordine: tot, detail };\n  }\n  compatPill(c) {\n    const stile = base => \"flex-shrink:0; font-size:11px; font-weight:800; border-radius:var(--radius-pill); padding:4px 10px; white-space:nowrap; \" + base;\n    if (c.level === \"ok\") return { pill: \"✅ \" + c.pct + \"%\", pillStyle: stile(\"background:var(--ok-bg); color:var(--ok-text);\") };\n    if (c.level === \"warn\") return { pill: \"⚠️ \" + c.pct + \"%\", pillStyle: stile(\"background:var(--warn-bg); color:var(--warn-text);\") };\n    if (c.level === \"verify\") return { pill: \"🟡 Verifica lingua\", pillStyle: stile(\"background:var(--gold-50); color:var(--gold-600);\") };\n    return { pill: c.pct == null ? \"🔒 Bloccata\" : \"🔒 \" + c.pct + \"%\", pillStyle: stile(\"background:var(--lock-bg); color:var(--lock-text);\") };\n  }\n  postiInParole(p) {\n    let t = p.numero + \" \" + (p.numero === 1 ? \"posto\" : \"posti\") + \" × \" + p.mesi + \" mesi (\" + p.livello + \")\";\n    if (p.note) t += \" — \" + p.note;\n    return t;\n  }\n  meteDelProfilo() {\n    const z = this.state.zaino;\n    const { METE } = this.dati();\n    if (!z || !z.profilo) return [];\n    return METE.filter(m => m.dipartimentoCf === z.profilo.dipartimento)\n      .map(m => ({ meta: m, c: this.compat(m, z.profilo) }))\n      .sort((a, b) => b.c.ordine - a.c.ordine);\n  }\n  listaDipartimenti() {\n    const visti = [];\n    this.dati().METE.forEach(m => { if (m.dipartimentoCf && !visti.includes(m.dipartimentoCf)) visti.push(m.dipartimentoCf); });\n    return visti;\n  }\n\n  scaricaICS() {\n    const { SCADENZE } = this.dati();\n    const pad = n => String(n).padStart(2, \"0\");\n    const fmt = dt => { const d = new Date(dt); return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + \"T\" + pad(d.getHours()) + pad(d.getMinutes()) + \"00\"; };\n    const esc = t => String(t || \"\").replace(/([,;])/g, \"\\\\$1\").replace(/\\n/g, \"\\\\n\");\n    const eventi = SCADENZE.map(s => [\"BEGIN:VEVENT\", \"UID:\" + s.id + \"@erasmuswiz\", \"DTSTAMP:\" + fmt(new Date().toISOString()), \"DTSTART:\" + fmt(s.data), \"SUMMARY:\" + esc(s.cosa), \"DESCRIPTION:\" + esc(s.descrizione), \"END:VEVENT\"].join(\"\\r\\n\"));\n    const ics = [\"BEGIN:VCALENDAR\", \"VERSION:2.0\", \"PRODID:-//ErasmusWiz//IT\"].concat(eventi, [\"END:VCALENDAR\"]).join(\"\\r\\n\");\n    const blob = new Blob([ics], { type: \"text/calendar;charset=utf-8\" });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url; a.download = \"erasmuswiz-scadenze.ics\";\n    document.body.appendChild(a); a.click(); a.remove();\n    URL.revokeObjectURL(url);\n  }\n\n  festeggia() {\n    this.setState({ festa: true });\n    clearTimeout(this._festaT);\n    this._festaT = setTimeout(() => this.setState({ festa: false }), 2600);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const desktop = s.largo >= 1000;\n    const noop = () => {};\n    const v = {\n      isDesktop: desktop, isMobile: !desktop,\n      mostraWiz: this.props.mascotte ?? true,\n      isPercorso: s.tab === \"percorso\", isMete: s.tab === \"mete\", isSchedina: s.tab === \"schedina\",\n      isCandidatura: s.tab === \"candidatura\", isRequisiti: s.tab === \"requisiti\", isPartenza: s.tab === \"partenza\",\n      tabLabel: s.tab,\n      mainStyle: \"flex:1; width:100%; max-width:\" + (desktop ? \"1120px\" : \"560px\") + \"; margin:0 auto; padding:\" + (desktop ? \"28px 32px 48px\" : \"20px 18px 110px\") + \";\",\n      percorsoGridStyle: desktop ? \"display:grid; grid-template-columns: 1fr 360px; gap:24px; align-items:start;\" : \"display:flex; flex-direction:column; gap:16px;\",\n      navItems: [], topCountdown: \"\", iniziale: \"S\", dataOggi: \"\", saluto: \"Ciao!\",\n      tappe: [], slotSchedina: [], scadenzeHome: [],\n      mossaTitolo: \"\", mossaDettaglio: \"\", mossaCta: \"\", mossaOnClick: noop,\n      cdTitolo: \"\", cdSotto: \"\", cdConto: \"\", cdPillStyle: \"\", prepFatti: 0, prepTot: 1, wizConsiglio: \"\",\n      goPercorso: () => this.setState({ tab: \"percorso\" }),\n      goMete: () => this.setState({ tab: \"mete\" }),\n      goSchedina: () => this.setState({ tab: \"schedina\" }),\n      goCandidatura: () => this.setState({ tab: \"candidatura\" }),\n      scaricaTutteICS: () => this.scaricaICS(),\n      esitoReqStyle: \"display:none;\", esitoReqTesto: \"\", requisiti: [],\n      meteTitolo: \"\", schedinaConta: \"\", cerca: s.cerca, onCerca: e => this.setState({ cerca: e.target.value, visibili: 12 }),\n      filtri: [], mete: [], meteHaAltre: false, mostraAltreLabel: \"\", onMostraAltre: noop,\n      righeSchedina: [], schedinaCta: \"Esplora le mete →\",\n      cdColore: \"var(--text-strong)\", cdBreve: \"\", cdEtichetta: \"\", festaVisibile: s.festa,\n      passiFocus: [], passiTutti: [], passiTot: 0, onSelezionato: noop, selezionatoLabel: \"\",\n      partenzaSotto: \"\", partenzaProssimo: \"\", partenzaConto: \"\", partFatti: 0, partTot: 1, partGruppi: [],\n      obVisibile: false, obDots: [], obEyebrow: \"\", obDomanda: \"\", obSotto: \"\",\n      obHasOpzioni: true, obOpzioni: [], obLanding: false, obLandingTitolo: \"\", obLandingDett: \"\", obInizia: noop\n    };\n    if (!s.pronto || !s.zaino) return v;\n\n    const z = s.zaino;\n    const { SCADENZE, CHECKLIST, CHECKLIST_POST, REQUISITI, METE } = this.dati();\n    const ora = this.ora();\n    const scadOrd = SCADENZE.slice().sort((a, b) => new Date(a.data) - new Date(b.data));\n    const chiusura = SCADENZE.find(x => x.chiusuraCandidature);\n    const gChiusura = chiusura ? this.giorniA(chiusura.data) : null;\n\n    // ===== nav =====\n    const tabsNav = [\n      { id: \"percorso\", label: \"Percorso\", icona: \"🧭\" },\n      { id: \"mete\", label: \"Mete\", icona: \"🗺️\" },\n      { id: \"schedina\", label: \"Schedina\", icona: \"⭐\" },\n      { id: z.selezionato ? \"partenza\" : \"candidatura\", label: z.selezionato ? \"Partenza\" : \"Candidatura\", icona: z.selezionato ? \"🎒\" : \"📋\" }\n    ];\n    v.navItems = tabsNav.map(t => {\n      const attivo = s.tab === t.id || (t.id === \"percorso\" && s.tab === \"requisiti\");\n      return {\n        label: t.label, icona: t.icona,\n        onClick: () => this.setState({ tab: t.id }),\n        styleDesktop: \"font-family:inherit; font-size:13.5px; font-weight:700; border:none; border-radius:var(--radius-pill); padding:8px 16px; cursor:pointer; \" + (attivo ? \"background:var(--blue-50); color:var(--blue-700);\" : \"background:none; color:var(--text-muted);\"),\n        styleMobile: \"font-family:inherit; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:10.5px; font-weight:700; padding:4px 10px; min-width:64px; \" + (attivo ? \"color:var(--gold-300);\" : \"color:#92b4ff;\")\n      };\n    });\n    v.iniziale = (z.profilo && z.profilo.nome ? z.profilo.nome[0] : \"S\").toUpperCase();\n    v.topCountdown = chiusura && gChiusura >= 0 ? \"Chiusura tra \" + gChiusura + \"g\" : \"Bando chiuso\";\n\n    // ===== stato fasi =====\n    const reqOk = REQUISITI.length > 0 && REQUISITI.every(r => z.autoverifica[r.id]);\n    const nSched = z.schedina.length;\n    const chkTot = CHECKLIST.length;\n    const chkFatti = CHECKLIST.filter(x => z.checklist[x.id]).length;\n    const chkOk = chkTot > 0 && chkFatti === chkTot;\n    v.prepFatti = chkFatti; v.prepTot = chkTot;\n\n    // ===== percorso =====\n    v.dataOggi = ora.toLocaleDateString(\"it-IT\", { weekday: \"short\", day: \"numeric\", month: \"short\", year: \"numeric\" }).toUpperCase();\n    v.saluto = z.profilo && z.profilo.nome ? \"Ciao, \" + z.profilo.nome + \" ✨\" : \"Ciao! ✨\";\n    const nReqOk = REQUISITI.filter(r => z.autoverifica[r.id]).length;\n    const fasi = [\n      { id: \"requisiti\", titolo: \"Posso partire?\", fatto: reqOk,\n        riassunto: reqOk ? \"Sei idonea: tutti i requisiti verificati.\" : nReqOk + \" requisiti su \" + REQUISITI.length + \" verificati.\",\n        cta: reqOk ? \"Rivedi i requisiti\" : \"Verifica i requisiti\" },\n      { id: \"schedina\", titolo: \"Dove posso andare?\", fatto: nSched >= 5,\n        riassunto: nSched === 0 ? \"Esplora le mete del tuo dipartimento e componi la schedina (fino a 5 scelte).\" : \"Hai scelto \" + nSched + \" mete su 5, in ordine di priorità.\",\n        cta: nSched === 0 ? \"Esplora le mete\" : \"Completa la schedina\" },\n      { id: \"candidatura\", titolo: \"La candidatura\", fatto: chkOk,\n        riassunto: chkFatti + \"/\" + chkTot + \" passi completati · su Esse3 entro il \" + (chiusura ? this.dataBreve(chiusura.data) + \", ore 12:00\" : \"\"),\n        cta: \"Vai ai passi\" },\n      { id: \"partenza\", titolo: \"La partenza\", fatto: false,\n        riassunto: z.selezionato ? \"In preparazione alla partenza 🎒\" : \"Dopo la graduatoria del 25 marzo.\",\n        cta: z.selezionato ? \"Continua la preparazione\" : \"Vedi cosa ti aspetta\" }\n    ];\n    let attivaAssegnata = false;\n    const stati = fasi.map((f, i) => {\n      if (z.selezionato) return i < 3 ? \"fatto\" : \"attivo\";\n      if (f.fatto) return \"fatto\";\n      if (!attivaAssegnata) { attivaAssegnata = true; return \"attivo\"; }\n      return \"futuro\";\n    });\n ont-family:inherit; background:none; border:none; padding:0; font-size:13px; font-weight:700; cursor:pointer; color:\" + (inSched ? \"var(--gold-600)\" : nSched >= 5 ? \"var(--text-faint)\" : \"var(--text-link)\") + \";\",\n        onSchedina: () => {\n          if (inSched) this.muta(zz => { zz.schedina = zz.schedina.filter(x => x !== meta.id); });\n          else if (nSched < 5) this.muta(zz => { zz.schedina.push(meta.id); });\n        }\n      };\n    });\n    v.meteHaAltre = filtrate.length > s.visibili;\n    v.mostraAltreLabel = \"Mostra altre \" + Math.min(12, filtrate.length - s.visibili) + \" mete\";\n    v.onMostraAltre = () => this.setState({ visibili: s.visibili + 12 });\n\n    // ===== schedina (4b) =====\n    v.righeSchedina = [0, 1, 2, 3, 4].map(i => {\n      const id = z.schedina[i];\n      const m = id ? tuttePerId[id] : null;\n      const base = \"display:flex; align-items:center; gap:12px; padding:13px 0;\" + (i < 4 ? \" border-bottom:1px dashed var(--border-subtle);\" : \"\");\n      if (m) {\n        const c = this.compat(m, z.profilo);\n        const p = this.compatPill(c);\n        return {\n          piena: true, num: String(i + 1),\n          numStyle: \"flex-shrink:0; width:30px; height:30px; border-radius:10px; display:grid; place-items:center; font-family:var(--font-mono); font-weight:700; font-size:14px; \" + (i === 0 ? \"background:var(--gold-400); color:var(--ink-900);\" : \"background:var(--bg-sunken); color:var(--text-strong);\"),\n          nome: m.universita, nomeStyle: \"font-size:13.5px; font-weight:800; color:var(--text-strong); line-height:1.3;\",\n          sotto: (m.citta ? m.citta + \", \" + m.paese : m.paese) + \" · \" + p.pill,\n          style: base,\n          frecciaStyle: \"font-family:inherit; background:var(--bg-sunken); border:none; border-radius:8px; width:26px; height:24px; font-size:10px; color:var(--text-muted); cursor:pointer;\",\n          rimuoviStyle: \"font-family:inherit; background:var(--lock-bg); border:none; border-radius:8px; width:26px; height:24px; font-size:11px; color:var(--lock-text); cursor:pointer; margin-left:4px;\",\n          onSu: () => { if (i > 0) this.muta(zz => { const t = zz.schedina[i - 1]; zz.schedina[i - 1] = zz.schedina[i]; zz.schedina[i] = t; }); },\n          onGiu: () => { if (i < z.schedina.length - 1) this.muta(zz => { const t = zz.schedina[i + 1]; zz.schedina[i + 1] = zz.schedina[i]; zz.schedina[i] = t; }); },\n          onRimuovi: () => this.muta(zz => { zz.schedina = zz.schedina.filter(x => x !== id); })\n        };\n      }\n      const prossimo = i === nSched;\n      return {\n        piena: false, num: String(i + 1),\n        numStyle: \"flex-shrink:0; width:30px; height:30px; border-radius:10px; display:grid; place-items:center; font-family:var(--font-mono); font-size:14px; border:1.5px dashed \" + (prossimo ? \"var(--ink-300)\" : \"var(--ink-100)\") + \"; color:\" + (prossimo ? \"var(--text-faint)\" : \"var(--ink-200)\") + \";\",\n        nome: prossimo ? \"+ Aggiungi la \" + (i + 1) + \"ª scelta\" : \"Vuota\",\n        nomeStyle: \"font-size:13px; font-weight:600; color:\" + (prossimo ? \"var(--text-faint)\" : \"var(--ink-200)\") + \";\",\n        sotto: \"\", style: base + \" cursor:pointer;\"\n      };\n    });\n    v.schedinaCta = nSched >= 5 ? \"Schedina completa — rivedi le mete\" : \"Esplora le mete →\";\n\n    // ===== candidatura (5b) =====\n    v.cdBreve = gChiusura != null && gChiusura >= 0 ? gChiusura + \"g\" : \"chiuso\";\n    v.cdColore = gChiusura != null && gChiusura <= 7 ? \"var(--lock-text)\" : \"var(--warn-text)\";\n    v.cdEtichetta = \"alla chiusura\";\n    const daFare = CHECKLIST.filter(x => !z.checklist[x.id]);\n    v.passiFocus = daFare.slice(0, 3).map((voce, i) => {\n      const primo = i === 0;\n      const scad = SCADENZE.find(x => x.id === voce.scadenzaId);\n      return {\n        num: String(i + 1), testo: voce.testo, primo, nonPrimo: !primo,\n        spiegazione: voce.spiegazione || \"\",\n        hasCitazione: !!voce.citazione, citazione: voce.citazione || \"\",\n        hasAzione: !!voce.azione, azione: voce.azione || \"\",\n        comeAperto: s.comeAperto === voce.id,\n        onCome: () => this.setState({ comeAperto: s.comeAperto === voce.id ? null : voce.id }),\n        onFatto: () => { this.festeggia(); this.muta(zz => { zz.checklist[voce.id] = true; }); },\n        sotto: scad ? \"Entro il \" + this.dataBreve(scad.data) + \" · \" + this.contoParole(scad.data) : \"Quando puoi\",\n        cardStyle: \"background:var(--paper); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); padding:16px; display:flex; gap:12px; align-items:flex-start; border:\" + (primo ? \"1.5px solid var(--blue-500)\" : \"1px solid var(--border-subtle)\") + \";\",\n        numStyle: \"flex-shrink:0; width:28px; height:28px; border-radius:50%; display:grid; place-items:center; font-weight:800; font-size:13px; \" + (primo ? \"background:var(--blue-500); color:#fff;\" : \"background:var(--bg-sunken); color:var(--text-muted);\"),\n        titoloStyle: \"font-size:\" + (primo ? \"15px\" : \"14px\") + \"; font-weight:\" + (primo ? \"800\" : \"700\") + \"; line-height:1.35; color:var(--text-strong);\"\n      };\n    });\n    if (daFare.length === 0) {\n      v.passiFocus = [{\n        num: \"✓\", testo: \"Hai completato tutti i passi della candidatura 🎉\", primo: false, nonPrimo: true,\n        sotto: \"Ora si aspetta la graduatoria del 25 marzo.\",\n        cardStyle: \"background:var(--ok-bg); border:1px solid var(--ok-line); border-radius:var(--radius-lg); padding:16px; display:flex; gap:12px; align-items:flex-start;\",\n        numStyle: \"flex-shrink:0; width:28px; height:28px; border-radius:50%; background:var(--ok-500); color:#fff; display:grid; place-items:center; font-weight:800; font-size:13px;\",\n        titoloStyle: \"font-size:14.5px; font-weight:800; color:var(--ok-text);\"\n      }];\n    }\n    v.passiTot = chkTot;\n    v.passiTutti = CHECKLIST.map(voce => ({\n      testo: voce.testo,\n      checked: !!z.checklist[voce.id],\n      onToggle: val => { if (val) this.festeggia(); this.muta(zz => { zz.checklist[voce.id] = val; }); }\n    }));\n    v.onSelezionato = () => this.muta(zz => { zz.selezionato = !zz.selezionato; });\n    v.selezionatoLabel = z.selezionato ? \"← Non sono più in fase di partenza\" : \"🎉 Sono stata selezionata — vai alla partenza\";\n    if (z.selezionato && s.tab === \"candidatura\") v.isCandidatura = false;\n\n    // ===== partenza (6a) =====\n    const primaMeta = z.schedina[0] ? tuttePerId[z.schedina[0]] : null;\n    v.partenzaSotto = (primaMeta ? (primaMeta.citta || primaMeta.universita) + \" ti aspetta · \" : \"\") + \"finestra di mobilità dal 15 lug 2026\";\n    const accett = SCADENZE.find(x => x.id === \"cf-accettazione\");\n    v.partenzaProssimo = accett ? accett.cosa + \" — \" + this.dataBreve(accett.data) + \", ore 12:00\" : \"\";\n    v.partenzaConto = accett ? this.contoParole(accett.data) : \"\";\n    const postTot = CHECKLIST_POST.length;\n    const postFatti = CHECKLIST_POST.filter(x => z.checklistPost[x.id]).length;\n    v.partFatti = postFatti; v.partTot = postTot;\n    const fasiPost = [];\n    CHECKLIST_POST.forEach(voce => { if (!fasiPost.includes(voce.fase)) fasiPost.push(voce.fase); });\n    v.partGruppi = fasiPost.map(fase => {\n      const voci = CHECKLIST_POST.filter(x => x.fase === fase);\n      return {\n        fase: fase.toUpperCase(),\n        conta: voci.filter(x => z.checklistPost[x.id]).length + \"/\" + voci.length,\n        voci: voci.map(voce => ({\n          testo: voce.testo,\n          checked: !!z.checklistPost[voce.id],\n          onToggle: val => { if (val) this.festeggia(); this.muta(zz => { zz.checklistPost[voce.id] = val; }); }\n        }))\n      };\n    });\n\n    // ===== onboarding (2b) =====\n    const ob = z.obStep;\n    v.obVisibile = ob >= 0;\n    if (ob >= 0) {\n      v.obDots = [0, 1, 2].map(i => ({\n        style: \"height:5px; flex:1; border-radius:var(--radius-pill); background:\" + (i <= Math.min(ob, 2) ? \"var(--blue-500)\" : \"var(--ink-100)\") + \";\"\n      }));\n      const stileOpz = attivo => \"font-family:inherit; font-size:15px; font-weight:\" + (attivo ? \"700\" : \"600\") + \"; text-align:left; background:var(--paper); border:\" + (attivo ? \"1.5px solid var(--blue-500)\" : \"1px solid var(--border-subtle)\") + \"; color:var(--text-strong); border-radius:var(--radius-md); padding:15px 18px; cursor:pointer; box-shadow:var(--shadow-sm);\";\n      if (ob === 0) {\n        v.obEyebrow = \"DOMANDA 1 DI 3\"; v.obDomanda = \"Dove studi?\";\n        v.obSotto = \"Per ora c'è Ca' Foscari: altre università in arrivo.\";\n        v.obHasOpzioni = true; v.obLanding = false;\n        v.obOpzioni = [{ label: \"Ca' Foscari Venezia\", onClick: () => this.muta(zz => { zz.obStep = 1; }) }].map(o => ({ ...o, style: stileOpz(false) }));\n      } else if (ob === 1) {\n        v.obEyebrow = \"DOMANDA 2 DI 3\"; v.obDomanda = \"Cosa studi?\";\n        v.obSotto = \"Ti mostreremo solo le mete del tuo dipartimento.\";\n        v.obHasOpzioni = true; v.obLanding = false;\n        v.obOpzioni = this.listaDipartimenti().map(dip => ({\n          label: dip, style: stileOpz(false),\n          onClick: () => this.muta(zz => { zz.obStep = 2; zz.obDip = dip; })\n        }));\n      } else if (ob === 2) {\n        v.obEyebrow = \"DOMANDA 3 DI 3\"; v.obDomanda = \"A che punto sei?\";\n        v.obSotto = \"I posti di ogni meta valgono per un livello specifico.\";\n        v.obHasOpzioni = true; v.obLanding = false;\n        v.obOpzioni = [{ label: \"Triennale (L)\", liv: \"L\" }, { label: \"Magistrale (LM)\", liv: \"LM\" }].map(o => ({\n          label: o.label, style: stileOpz(false),\n          onClick: () => this.muta(zz => { zz.obStep = 3; zz.profilo = { nome: \"\", dipartimento: zz.obDip, livello: o.liv, lingue: [{ lingua: \"Inglese\", livello: \"B2\", certificata: false }] }; })\n        }));\n      } else {\n        const nMete = METE.filter(m => m.dipartimentoCf === z.profilo.dipartimento).length;\n        v.obEyebrow = \"FATTO ✨\"; v.obDomanda = \"Il tuo percorso è pronto\";\n        v.obSotto = \"\";\n        v.obHasOpzioni = false; v.obLanding = true;\n        v.obLandingTitolo = \"Per te ci sono \" + nMete + \" mete a \" + z.profilo.dipartimento;\n        v.obLandingDett = chiusura && gChiusura >= 0 ? \"La prossima scadenza è la chiusura candidature: \" + this.dataBreve(chiusura.data) + \", ore 12:00 — tra \" + gChiusura + \" giorni.\" : \"Il bando 2026/27 è chiuso: esplora le mete con calma.\";\n        v.obInizia = () => this.muta(zz => { zz.obStep = -1; });\n      }\n    }\n\n    return v;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
